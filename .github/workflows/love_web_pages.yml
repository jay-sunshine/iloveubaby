name: Love Web Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: love-web-pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.1
      GODOT_STATUS: stable
      GODOT_EDITOR_ZIP: Godot_v4.6.1-stable_linux.x86_64.zip
      GODOT_TEMPLATES_TPZ: Godot_v4.6.1-stable_export_templates.tpz
      GODOT_RELEASE_BASE: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/godot"
          curl -L "$GODOT_RELEASE_BASE/$GODOT_EDITOR_ZIP" -o "$RUNNER_TEMP/godot/editor.zip"
          unzip -q "$RUNNER_TEMP/godot/editor.zip" -d "$RUNNER_TEMP/godot/editor"
          GODOT_BIN="$(find "$RUNNER_TEMP/godot/editor" -type f -name 'Godot*linux.x86_64' | head -n 1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          curl -L "$GODOT_RELEASE_BASE/$GODOT_TEMPLATES_TPZ" -o "$RUNNER_TEMP/godot/export_templates.tpz"
          unzip -q "$RUNNER_TEMP/godot/export_templates.tpz" -d "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"

      - name: Point CI build to love scene
        run: python3 tools/export/prepare_love_web.py

      - name: Import project assets
        shell: bash
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --import --quit

      - name: Export web build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/web
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Web" build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
